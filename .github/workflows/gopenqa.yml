name: gopenqa

on: push

jobs:
  gopenqa:
    name: gopenqa test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.20'
      - name: Install requirements
        run: go get github.com/streadway/amqp
      - name: Run test suite
        run: go test ./...
